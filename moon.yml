language: 'go'
layer: 'application'
stack: 'backend'

project:
  title: 'YACD'
  description: 'Kubernetes-native Cardano development environment manager.'
  owner: 'meigma'
  maintainers:
    - 'meigma'

fileGroups:
  goSources:
    - 'api/**/*.go'
    - 'cli/**/*.go'
    - 'cmd/**/*.go'
    - 'containers/cardano-testnet/**/*.go'
    - 'containers/cardano-testnet/go.mod'
    - 'containers/cardano-testnet/publisher/go.mod'
    - 'containers/cardano-testnet/publisher/go.sum'
    - 'internal/**/*.go'
    - 'services/**/*.go'
    - 'test/**/*.go'
    - 'go.mod'
    - 'go.sum'
  generatorSources:
    - 'api/**/*.go'
    - 'cmd/**/*.go'
    - 'internal/**/*.go'
    - 'PROJECT'
    - 'go.mod'
    - 'go.sum'
  chartSources:
    - 'charts/yacd/**/*'
  chainsawSources:
    - 'examples/**/*.yaml'
    - 'test/chainsaw/**/*.yaml'
  devStackSources:
    - '.ko.yaml'
    - '.tiltignore'
    - 'Tiltfile'
    - '.dev/ctlptl.yaml'
    - '.dev/ko-build.sh'
    - '.dev/ko-build-faucet.sh'
    - '.dev/scripts/dev-up.sh'
    - '.dev/scripts/dev-down.sh'
  toolchainConfig:
    - '.prototools'
    - '.moon/proto/**/*.toml'

workspace:
  inheritedTasks:
    include: []

tasks:
  check:
    command: 'bash .dev/scripts/check.sh'
    inputs:
      - '@group(goSources)'
      - '@group(generatorSources)'
      - '@group(chartSources)'
      - '@group(chainsawSources)'
      - '@group(toolchainConfig)'
      - '.golangci.yml'
      - '.dev/scripts/check.sh'
      - 'containers/cardano-testnet/Dockerfile'
      - 'containers/cardano-testnet/yacd-cardano-testnet-init'
    options:
      cache: false

  test:
    script: |
      set -euo pipefail
      KUBEBUILDER_ASSETS="$(setup-envtest use 1.35.x -p path)" go test ./...
      (cd containers/cardano-testnet && go test ./...)
      (cd containers/cardano-testnet/publisher && go test ./...)
    inputs:
      - '@group(goSources)'
      - '@group(generatorSources)'
      - '@group(toolchainConfig)'
      - 'charts/yacd/**/*'
    options:
      cache: false

  generate:
    script: |
      set -euo pipefail
      if [ -d api ]; then
        controller-gen object paths="./..."
        controller-gen crd paths="./..." output:crd:artifacts:config=charts/yacd/crds
      fi
      # Mockery v3 reads `go list` output via x/tools/go/packages. The proto
      # `go` shim mangles the templated `-f` argument it passes, so prepend
      # the real toolchain bin directory to PATH for this invocation only.
      GOTOOLCHAIN_BIN="$(dirname "$(proto bin go)")"
      MOCKERY_BIN="$(proto bin mockery)"
      PATH="$GOTOOLCHAIN_BIN:$PATH" "$MOCKERY_BIN"
    inputs:
      - '@group(generatorSources)'
      - '@group(toolchainConfig)'
      - '.mockery.yml'
      - 'cli/internal/**/*.go'
    outputs:
      - 'api/**/zz_generated.deepcopy.go'
      - 'charts/yacd/crds/**/*'
      - 'cli/internal/mocks/**/*.go'
    options:
      cache: false
      runInCI: false

  deploy:
    command: 'bash .dev/scripts/deploy.sh'
    inputs:
      - '@group(chartSources)'
      - '@group(toolchainConfig)'
      - '.dev/scripts/deploy.sh'
    options:
      cache: false
      runInCI: false

  undeploy:
    command: 'bash .dev/scripts/undeploy.sh'
    inputs:
      - '@group(chartSources)'
      - '@group(toolchainConfig)'
      - '.dev/scripts/undeploy.sh'
    options:
      cache: false
      runInCI: false

  dev-up:
    command: 'bash .dev/scripts/dev-up.sh'
    inputs:
      - '@group(devStackSources)'
      - '@group(chartSources)'
      - '@group(goSources)'
      - '@group(toolchainConfig)'
    options:
      cache: false
      runInCI: false

  dev-down:
    command: 'bash .dev/scripts/dev-down.sh'
    inputs:
      - '@group(devStackSources)'
      - '@group(toolchainConfig)'
    options:
      cache: false
      runInCI: false

  test-e2e:
    command: 'bash .dev/scripts/test-e2e.sh'
    inputs:
      - '@group(goSources)'
      - '@group(chartSources)'
      - '@group(chainsawSources)'
      - '@group(toolchainConfig)'
      - 'Dockerfile'
      - 'services/faucet/Dockerfile'
      - '.dev/scripts/deploy.sh'
      - '.dev/scripts/undeploy.sh'
      - '.dev/scripts/test-e2e.sh'
    options:
      cache: false
      runInCI: false
