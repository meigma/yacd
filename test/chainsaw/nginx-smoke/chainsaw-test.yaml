apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: nginxdeployment-smoke
spec:
  description: Verify the template operator deploys and reconciles the sample NginxDeployment.
  concurrent: false
  failFast: true
  catch:
    - script:
        timeout: 1m
        workDir: ../../..
        content: |
          set +e
          export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
          echo "== controller manager logs =="
          kubectl logs -n template-k8s-system -l control-plane=controller-manager -c manager --tail=-1 --prefix
          echo "== manager namespace events =="
          kubectl get events -n template-k8s-system --sort-by=.lastTimestamp
          echo "== metrics curl logs =="
          kubectl logs -n template-k8s-system curl-metrics
          echo "== metrics curl pod =="
          kubectl describe pod -n template-k8s-system curl-metrics
          echo "== sample namespace events =="
          kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp
          echo "== controller manager deployment =="
          kubectl describe deployment -n template-k8s-system template-k8s-controller-manager
          echo "== sample NginxDeployment =="
          kubectl describe nginxdeployment -n "$NAMESPACE" nginx-sample
          echo "== sample Deployment =="
          kubectl describe deployment -n "$NAMESPACE" nginx-sample
          exit 0
  steps:
    - name: deploy-controller
      try:
        - script:
            timeout: 5m
            workDir: ../../..
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              kubectl create namespace template-k8s-system --dry-run=client -o yaml | kubectl apply -f -
              kubectl label --overwrite namespace template-k8s-system pod-security.kubernetes.io/enforce=restricted
              IMG="${IMG:-example.com/template-k8s:v0.0.1}" LOCAL_IMAGE=true moon run root:deploy
        - wait:
            apiVersion: apps/v1
            kind: Deployment
            namespace: template-k8s-system
            name: template-k8s-controller-manager
            timeout: 3m
            for:
              condition:
                name: Available
                value: 'true'
        - assert:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: template-k8s-system
                name: template-k8s-controller-manager-metrics-service
        - script:
            timeout: 1m
            workDir: ../../..
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              kubectl apply -f - <<'YAML'
              apiVersion: v1
              kind: ServiceAccount
              metadata:
                name: metrics-smoke
                namespace: template-k8s-system
              ---
              apiVersion: rbac.authorization.k8s.io/v1
              kind: ClusterRoleBinding
              metadata:
                name: template-k8s-metrics-smoke
              roleRef:
                apiGroup: rbac.authorization.k8s.io
                kind: ClusterRole
                name: template-k8s-metrics-reader
              subjects:
                - kind: ServiceAccount
                  name: metrics-smoke
                  namespace: template-k8s-system
              ---
              apiVersion: v1
              kind: Pod
              metadata:
                name: curl-metrics
                namespace: template-k8s-system
              spec:
                restartPolicy: Never
                serviceAccountName: metrics-smoke
                securityContext:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                volumes:
                  - name: tmp
                    emptyDir: {}
                containers:
                  - name: curl
                    image: curlimages/curl:8.11.1
                    volumeMounts:
                      - name: tmp
                        mountPath: /tmp
                    command:
                      - /bin/sh
                      - -c
                    args:
                      - |
                        token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
                        for i in $(seq 1 30); do
                          status="$(curl -sk -o /tmp/metrics.txt -w '%{http_code}' -H "Authorization: Bearer ${token}" https://template-k8s-controller-manager-metrics-service.template-k8s-system.svc.cluster.local:8443/metrics || true)"
                          echo "metrics status: ${status}"
                          if [ "${status}" = "200" ]; then
                            head -n 20 /tmp/metrics.txt
                            grep -q "template_k8s_nginxdeployment_child_apply_total" /tmp/metrics.txt
                            grep -q "template_k8s_nginxdeployment_status_transition_total" /tmp/metrics.txt
                            exit 0
                          fi
                          sleep 2
                        done
                        exit 1
                    securityContext:
                      readOnlyRootFilesystem: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      runAsNonRoot: true
                      runAsUser: 1000
                      seccompProfile:
                        type: RuntimeDefault
              YAML
        - wait:
            apiVersion: v1
            kind: Pod
            namespace: template-k8s-system
            name: curl-metrics
            timeout: 3m
            for:
              jsonPath:
                path: '{.status.phase}'
                value: Succeeded
        - script:
            timeout: 1m
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              logs="$(kubectl logs -n template-k8s-system curl-metrics)"
              printf '%s\n' "$logs"
              case "$logs" in
                *"metrics status: 200"*) ;;
                *) exit 1 ;;
              esac
      cleanup:
        - script:
            timeout: 3m
            workDir: ../../..
            content: |
              set +e
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              kubectl delete -n "$NAMESPACE" -f test/chainsaw/fixtures/example_v1alpha1_nginxdeployment.yaml --ignore-not-found=true || true
              kubectl delete pod curl-metrics -n template-k8s-system --ignore-not-found=true || true
              kubectl delete clusterrolebinding template-k8s-metrics-smoke --ignore-not-found=true || true
              kubectl delete serviceaccount metrics-smoke -n template-k8s-system --ignore-not-found=true || true
              moon run root:undeploy || true
              kubectl delete namespace template-k8s-system --ignore-not-found=true || true
              exit 0
    - name: reconcile-sample
      try:
        - apply:
            file: ../fixtures/example_v1alpha1_nginxdeployment.yaml
        - wait:
            apiVersion: example.meigma.io/v1alpha1
            kind: NginxDeployment
            name: nginx-sample
            timeout: 3m
            for:
              condition:
                name: Available
                value: 'true'
        - wait:
            apiVersion: apps/v1
            kind: Deployment
            name: nginx-sample
            timeout: 3m
            for:
              condition:
                name: Available
                value: 'true'
        - assert:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: nginx-sample
        - script:
            timeout: 1m
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              for _ in $(seq 1 30); do
                reasons="$(kubectl get events -n "$NAMESPACE" \
                  --field-selector involvedObject.kind=NginxDeployment,involvedObject.name=nginx-sample \
                  -o jsonpath='{range .items[*]}{.reason}{"\n"}{end}' || true)"
                case "$reasons" in
                  *ChildResourcesApplied*|*DeploymentReady*) exit 0 ;;
                esac
                sleep 2
              done
              kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp
              exit 1
