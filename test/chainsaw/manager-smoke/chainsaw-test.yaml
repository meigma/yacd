apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: manager-smoke
spec:
  description: Verify the YACD operator foundation deploys and exposes protected metrics.
  concurrent: false
  failFast: true
  catch:
    - script:
        timeout: 1m
        workDir: ../../..
        content: |
          set +e
          export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
          echo "== controller manager logs =="
          kubectl logs -n yacd-system -l control-plane=controller-manager -c manager --tail=-1 --prefix
          echo "== manager namespace events =="
          kubectl get events -n yacd-system --sort-by=.lastTimestamp
          echo "== metrics curl logs =="
          kubectl logs -n yacd-system curl-metrics
          echo "== metrics curl pod =="
          kubectl describe pod -n yacd-system curl-metrics
          echo "== controller manager deployment =="
          kubectl describe deployment -n yacd-system yacd-controller-manager
          exit 0
  steps:
    - name: deploy-controller
      try:
        - script:
            timeout: 5m
            workDir: ../../..
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              kubectl create namespace yacd-system --dry-run=client -o yaml | kubectl apply -f -
              kubectl label --overwrite namespace yacd-system pod-security.kubernetes.io/enforce=restricted
              IMG="${IMG:-example.com/yacd:v0.0.1}" LOCAL_IMAGE=true moon run root:deploy
        - wait:
            apiVersion: apps/v1
            kind: Deployment
            namespace: yacd-system
            name: yacd-controller-manager
            timeout: 3m
            for:
              condition:
                name: Available
                value: 'true'
        - assert:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: yacd-system
                name: yacd-controller-manager-metrics-service
        - script:
            timeout: 1m
            workDir: ../../..
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              kubectl apply -f - <<'YAML'
              apiVersion: v1
              kind: ServiceAccount
              metadata:
                name: metrics-smoke
                namespace: yacd-system
              ---
              apiVersion: rbac.authorization.k8s.io/v1
              kind: ClusterRoleBinding
              metadata:
                name: yacd-metrics-smoke
              roleRef:
                apiGroup: rbac.authorization.k8s.io
                kind: ClusterRole
                name: yacd-metrics-reader
              subjects:
                - kind: ServiceAccount
                  name: metrics-smoke
                  namespace: yacd-system
              ---
              apiVersion: v1
              kind: Pod
              metadata:
                name: curl-metrics
                namespace: yacd-system
              spec:
                restartPolicy: Never
                serviceAccountName: metrics-smoke
                securityContext:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                volumes:
                  - name: tmp
                    emptyDir: {}
                containers:
                  - name: curl
                    image: curlimages/curl:8.11.1
                    volumeMounts:
                      - name: tmp
                        mountPath: /tmp
                    command:
                      - /bin/sh
                      - -c
                    args:
                      - |
                        token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
                        for i in $(seq 1 30); do
                          status="$(curl -sk -o /tmp/metrics.txt -w '%{http_code}' -H "Authorization: Bearer ${token}" https://yacd-controller-manager-metrics-service.yacd-system.svc.cluster.local:8443/metrics || true)"
                          echo "metrics status: ${status}"
                          if [ "${status}" = "200" ]; then
                            head -n 20 /tmp/metrics.txt
                            grep -q "go_goroutines" /tmp/metrics.txt
                            exit 0
                          fi
                          sleep 2
                        done
                        exit 1
                    securityContext:
                      readOnlyRootFilesystem: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      runAsNonRoot: true
                      runAsUser: 1000
                      seccompProfile:
                        type: RuntimeDefault
              YAML
        - wait:
            apiVersion: v1
            kind: Pod
            namespace: yacd-system
            name: curl-metrics
            timeout: 3m
            for:
              jsonPath:
                path: '{.status.phase}'
                value: Succeeded
        - script:
            timeout: 1m
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              logs="$(kubectl logs -n yacd-system curl-metrics)"
              printf '%s\n' "$logs"
              case "$logs" in
                *"metrics status: 200"*) ;;
                *) exit 1 ;;
              esac
      cleanup:
        - script:
            timeout: 3m
            workDir: ../../..
            content: |
              set +e
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              kubectl delete pod curl-metrics -n yacd-system --ignore-not-found=true || true
              kubectl delete clusterrolebinding yacd-metrics-smoke --ignore-not-found=true || true
              kubectl delete serviceaccount metrics-smoke -n yacd-system --ignore-not-found=true || true
              moon run root:undeploy || true
              kubectl delete namespace yacd-system --ignore-not-found=true || true
              exit 0
