apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: manager-smoke
spec:
  description: Verify the YACD operator foundation deploys, exposes protected metrics, and reconciles one CardanoNetwork to Kubernetes workload plus Ogmios, Kupo, and faucet readiness.
  concurrent: false
  failFast: true
  catch:
    - script:
        timeout: 1m
        workDir: ../../..
        content: |
          set +e
          export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
          echo "== controller manager logs =="
          kubectl logs -n yacd-system -l control-plane=controller-manager -c manager --tail=-1 --prefix
          echo "== manager namespace events =="
          kubectl get events -n yacd-system --sort-by=.lastTimestamp
          echo "== metrics curl logs =="
          kubectl logs -n yacd-system curl-metrics
          echo "== metrics curl pod =="
          kubectl describe pod -n yacd-system curl-metrics
          echo "== controller manager deployment =="
          kubectl describe deployment -n yacd-system yacd-controller-manager
          echo "== CardanoNetwork smoke resource =="
          kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o yaml
          echo "== CardanoDBSync managed smoke resource =="
          kubectl get cardanodbsync -n yacd-smoke phase6-managed -o yaml
          echo "== CardanoNetwork smoke resources =="
          kubectl get all,pvc,secret,configmap,serviceaccount,role,rolebinding -n yacd-smoke -l yacd.meigma.io/cardanonetwork=phase4-smoke -o wide
          echo "== CardanoDBSync managed smoke resources =="
          kubectl get all,pvc,secret,configmap -n yacd-smoke -l yacd.meigma.io/cardanodbsync=phase6-managed -o wide
          echo "== CardanoNetwork smoke events =="
          kubectl get events -n yacd-smoke --sort-by=.lastTimestamp
          echo "== CardanoNetwork smoke child descriptions =="
          kubectl describe pvc -n yacd-smoke phase4-smoke-node-state
          kubectl describe service -n yacd-smoke phase4-smoke-node
          kubectl describe service -n yacd-smoke phase4-smoke-ogmios
          kubectl describe service -n yacd-smoke phase4-smoke-kupo
          kubectl describe service -n yacd-smoke phase4-smoke-faucet
          kubectl describe secret -n yacd-smoke phase4-smoke-faucet-auth
          kubectl describe configmap -n yacd-smoke phase4-smoke-network-artifacts
          kubectl describe serviceaccount -n yacd-smoke phase4-smoke-artifact-publisher
          kubectl describe role -n yacd-smoke phase4-smoke-artifact-publisher
          kubectl describe rolebinding -n yacd-smoke phase4-smoke-artifact-publisher
          kubectl describe deployment -n yacd-smoke phase4-smoke-node
          kubectl describe deployment -n yacd-smoke phase6-managed-postgres
          kubectl describe deployment -n yacd-smoke phase6-managed-dbsync
          kubectl describe pod -n yacd-smoke -l yacd.meigma.io/cardanonetwork=phase4-smoke,yacd.meigma.io/role=primary-node
          kubectl describe pod -n yacd-smoke -l yacd.meigma.io/cardanodbsync=phase6-managed
          echo "== Ogmios curl logs =="
          kubectl logs -n yacd-smoke curl-ogmios || true
          echo "== Kupo curl logs =="
          kubectl logs -n yacd-smoke curl-kupo || true
          echo "== Faucet curl logs =="
          kubectl logs -n yacd-smoke curl-faucet || true
          echo "== CardanoNetwork smoke pod logs =="
          kubectl logs -n yacd-smoke -l yacd.meigma.io/cardanonetwork=phase4-smoke,yacd.meigma.io/role=primary-node --all-containers --prefix --tail=-1
          echo "== CardanoDBSync managed smoke pod logs =="
          kubectl logs -n yacd-smoke -l yacd.meigma.io/cardanodbsync=phase6-managed --all-containers --prefix --tail=-1
          exit 0
  steps:
    - name: deploy-controller
      try:
        - script:
            timeout: 5m
            workDir: ../../..
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              kubectl create namespace yacd-system --dry-run=client -o yaml | kubectl apply -f -
              kubectl label --overwrite namespace yacd-system pod-security.kubernetes.io/enforce=restricted
              IMG="${IMG:-example.com/yacd:v0.0.1}" FAUCET_IMG="${FAUCET_IMG:-example.com/yacd-faucet:v0.0.1}" LOCAL_IMAGE=true moon run root:deploy
        - wait:
            apiVersion: apps/v1
            kind: Deployment
            namespace: yacd-system
            name: yacd-controller-manager
            timeout: 3m
            for:
              condition:
                name: Available
                value: 'true'
        - assert:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: yacd-system
                name: yacd-controller-manager-metrics-service
        - script:
            timeout: 1m
            workDir: ../../..
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              kubectl apply -f - <<'YAML'
              apiVersion: v1
              kind: ServiceAccount
              metadata:
                name: metrics-smoke
                namespace: yacd-system
              ---
              apiVersion: rbac.authorization.k8s.io/v1
              kind: ClusterRoleBinding
              metadata:
                name: yacd-metrics-smoke
              roleRef:
                apiGroup: rbac.authorization.k8s.io
                kind: ClusterRole
                name: yacd-metrics-reader
              subjects:
                - kind: ServiceAccount
                  name: metrics-smoke
                  namespace: yacd-system
              ---
              apiVersion: v1
              kind: Pod
              metadata:
                name: curl-metrics
                namespace: yacd-system
              spec:
                restartPolicy: Never
                serviceAccountName: metrics-smoke
                securityContext:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                volumes:
                  - name: tmp
                    emptyDir: {}
                containers:
                  - name: curl
                    image: curlimages/curl:8.11.1
                    volumeMounts:
                      - name: tmp
                        mountPath: /tmp
                    command:
                      - /bin/sh
                      - -c
                    args:
                      - |
                        token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
                        for i in $(seq 1 30); do
                          status="$(curl -sk -o /tmp/metrics.txt -w '%{http_code}' -H "Authorization: Bearer ${token}" https://yacd-controller-manager-metrics-service.yacd-system.svc.cluster.local:8443/metrics || true)"
                          echo "metrics status: ${status}"
                          if [ "${status}" = "200" ]; then
                            head -n 20 /tmp/metrics.txt
                            grep -q "go_goroutines" /tmp/metrics.txt
                            exit 0
                          fi
                          sleep 2
                        done
                        exit 1
                    securityContext:
                      readOnlyRootFilesystem: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      runAsNonRoot: true
                      runAsUser: 1000
                      seccompProfile:
                        type: RuntimeDefault
              YAML
        - wait:
            apiVersion: v1
            kind: Pod
            namespace: yacd-system
            name: curl-metrics
            timeout: 3m
            for:
              jsonPath:
                path: '{.status.phase}'
                value: Succeeded
        - script:
            timeout: 1m
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              logs="$(kubectl logs -n yacd-system curl-metrics)"
              printf '%s\n' "$logs"
              case "$logs" in
                *"metrics status: 200"*) ;;
                *) exit 1 ;;
              esac
        - script:
            timeout: 12m
            workDir: ../../..
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              kubectl create namespace yacd-smoke --dry-run=client -o yaml | kubectl apply -f -
              kubectl label --overwrite namespace yacd-smoke pod-security.kubernetes.io/enforce=restricted
              go run ./cli/cmd/yacd deploy -f examples/local/yacd.yaml --namespace yacd-smoke --wait --timeout 10m
        - assert:
            resource:
              apiVersion: v1
              kind: PersistentVolumeClaim
              metadata:
                namespace: yacd-smoke
                name: phase4-smoke-node-state
        - assert:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: yacd-smoke
                name: phase4-smoke-node
              spec:
                type: ClusterIP
                ports:
                  - name: node-to-node
                    protocol: TCP
                    port: 3001
                    targetPort: node-to-node
        - assert:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: yacd-smoke
                name: phase4-smoke-ogmios
              spec:
                type: ClusterIP
                ports:
                  - name: ogmios
                    protocol: TCP
                    port: 1337
                    targetPort: ogmios
        - assert:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: yacd-smoke
                name: phase4-smoke-kupo
              spec:
                type: ClusterIP
                ports:
                  - name: kupo
                    protocol: TCP
                    port: 1442
                    targetPort: kupo
        - assert:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: yacd-smoke
                name: phase4-smoke-faucet
              spec:
                type: ClusterIP
                ports:
                  - name: faucet
                    protocol: TCP
                    port: 8080
                    targetPort: faucet
        - assert:
            resource:
              apiVersion: v1
              kind: Secret
              metadata:
                namespace: yacd-smoke
                name: phase4-smoke-faucet-auth
              type: Opaque
        - assert:
            resource:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                namespace: yacd-smoke
                name: phase4-smoke-network-artifacts
        - assert:
            resource:
              apiVersion: v1
              kind: ServiceAccount
              metadata:
                namespace: yacd-smoke
                name: phase4-smoke-artifact-publisher
              automountServiceAccountToken: false
        - assert:
            resource:
              apiVersion: rbac.authorization.k8s.io/v1
              kind: Role
              metadata:
                namespace: yacd-smoke
                name: phase4-smoke-artifact-publisher
              rules:
                - apiGroups:
                    - ""
                  resources:
                    - configmaps
                  resourceNames:
                    - phase4-smoke-network-artifacts
                  verbs:
                    - get
                    - patch
        - assert:
            resource:
              apiVersion: rbac.authorization.k8s.io/v1
              kind: RoleBinding
              metadata:
                namespace: yacd-smoke
                name: phase4-smoke-artifact-publisher
              roleRef:
                apiGroup: rbac.authorization.k8s.io
                kind: Role
                name: phase4-smoke-artifact-publisher
              subjects:
                - kind: ServiceAccount
                  name: phase4-smoke-artifact-publisher
                  namespace: yacd-smoke
        - wait:
            apiVersion: apps/v1
            kind: Deployment
            namespace: yacd-smoke
            name: phase4-smoke-node
            timeout: 10m
            for:
              condition:
                name: Available
                value: 'true'
        - script:
            timeout: 10m
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              selector="yacd.meigma.io/cardanonetwork=phase4-smoke,yacd.meigma.io/role=primary-node"
              kubectl wait -n yacd-smoke --for=condition=Ready pod -l "${selector}" --timeout=10m
        - script:
            timeout: 10m
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              for _ in $(seq 1 120); do
                ready="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)"
                node_ready="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.conditions[?(@.type=="NodeReady")].status}' 2>/dev/null || true)"
                artifacts_ready="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.conditions[?(@.type=="ArtifactsReady")].status}' 2>/dev/null || true)"
                ogmios_ready="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.conditions[?(@.type=="OgmiosReady")].status}' 2>/dev/null || true)"
                kupo_ready="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.conditions[?(@.type=="KupoReady")].status}' 2>/dev/null || true)"
                faucet_ready="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.conditions[?(@.type=="FaucetReady")].status}' 2>/dev/null || true)"
                progressing="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.conditions[?(@.type=="Progressing")].status}' 2>/dev/null || true)"
                degraded="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.conditions[?(@.type=="Degraded")].status}' 2>/dev/null || true)"
                service_name="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.endpoints.nodeToNode.serviceName}' 2>/dev/null || true)"
                port="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.endpoints.nodeToNode.port}' 2>/dev/null || true)"
                url="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.endpoints.nodeToNode.url}' 2>/dev/null || true)"
                ogmios_service_name="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.endpoints.ogmios.serviceName}' 2>/dev/null || true)"
                ogmios_port="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.endpoints.ogmios.port}' 2>/dev/null || true)"
                ogmios_url="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.endpoints.ogmios.url}' 2>/dev/null || true)"
                kupo_service_name="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.endpoints.kupo.serviceName}' 2>/dev/null || true)"
                kupo_port="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.endpoints.kupo.port}' 2>/dev/null || true)"
                kupo_url="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.endpoints.kupo.url}' 2>/dev/null || true)"
                faucet_service_name="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.endpoints.faucet.serviceName}' 2>/dev/null || true)"
                faucet_port="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.endpoints.faucet.port}' 2>/dev/null || true)"
                faucet_url="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.endpoints.faucet.url}' 2>/dev/null || true)"
                faucet_auth_secret="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.faucet.authSecretName}' 2>/dev/null || true)"
                artifacts_configmap="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.artifacts.networkConfigMapName}' 2>/dev/null || true)"
                artifacts_schema="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.artifacts.schemaVersion}' 2>/dev/null || true)"
                artifacts_hash="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.artifacts.dataHash}' 2>/dev/null || true)"
                if [ "${ready}" = "True" ] &&
                  [ "${node_ready}" = "True" ] &&
                  [ "${artifacts_ready}" = "True" ] &&
                  [ "${ogmios_ready}" = "True" ] &&
                  [ "${kupo_ready}" = "True" ] &&
                  [ "${faucet_ready}" = "True" ] &&
                  [ "${progressing}" = "False" ] &&
                  [ "${degraded}" = "False" ] &&
                  [ "${service_name}" = "phase4-smoke-node" ] &&
                  [ "${port}" = "3001" ] &&
                  [ "${url}" = "tcp://phase4-smoke-node.yacd-smoke.svc.cluster.local:3001" ] &&
                  [ "${ogmios_service_name}" = "phase4-smoke-ogmios" ] &&
                  [ "${ogmios_port}" = "1337" ] &&
                  [ "${ogmios_url}" = "ws://phase4-smoke-ogmios.yacd-smoke.svc.cluster.local:1337" ] &&
                  [ "${kupo_service_name}" = "phase4-smoke-kupo" ] &&
                  [ "${kupo_port}" = "1442" ] &&
                  [ "${kupo_url}" = "http://phase4-smoke-kupo.yacd-smoke.svc.cluster.local:1442" ] &&
                  [ "${faucet_service_name}" = "phase4-smoke-faucet" ] &&
                  [ "${faucet_port}" = "8080" ] &&
                  [ "${faucet_url}" = "http://phase4-smoke-faucet.yacd-smoke.svc.cluster.local:8080" ] &&
                  [ "${faucet_auth_secret}" = "phase4-smoke-faucet-auth" ] &&
                  [ "${artifacts_configmap}" = "phase4-smoke-network-artifacts" ] &&
                  [ "${artifacts_schema}" = "yacd.meigma.io/cardano-network-artifacts/v1alpha1" ] &&
                  [ "${artifacts_hash#sha256:}" != "${artifacts_hash}" ]; then
                  exit 0
                fi
                kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o yaml || true
                sleep 5
              done
              exit 1
        - script:
            timeout: 1m
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              network_json="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o json)"
              configmap_json="$(kubectl get configmap -n yacd-smoke phase4-smoke-network-artifacts -o json)"
              NETWORK_JSON="${network_json}" CONFIGMAP_JSON="${configmap_json}" python3 - <<'PY'
              import json
              import os

              network = json.loads(os.environ["NETWORK_JSON"])
              configmap = json.loads(os.environ["CONFIGMAP_JSON"])
              required = [
                  "configuration.yaml",
                  "byron-genesis.json",
                  "shelley-genesis.json",
                  "alonzo-genesis.json",
                  "conway-genesis.json",
                  "primary-topology.json",
                  "yacd-localnet-plan.json",
                  "connection.json",
              ]

              artifacts = network["status"]["artifacts"]
              annotations = configmap["metadata"]["annotations"]
              data = configmap["data"]
              assert artifacts["networkConfigMapName"] == "phase4-smoke-network-artifacts"
              assert artifacts["schemaVersion"] == "yacd.meigma.io/cardano-network-artifacts/v1alpha1"
              assert artifacts["dataHash"].startswith("sha256:")
              assert annotations["yacd.meigma.io/artifact-schema-version"] == artifacts["schemaVersion"]
              assert annotations["yacd.meigma.io/artifact-data-hash"] == artifacts["dataHash"]
              assert annotations["yacd.meigma.io/localnet-fingerprint"] == network["status"]["network"]["localnetFingerprint"]
              for key in required:
                  assert key in data, key
              connection = json.loads(data["connection.json"])
              assert connection["schemaVersion"] == artifacts["schemaVersion"]
              assert connection["network"]["name"] == "phase4-smoke"
              assert connection["network"]["namespace"] == "yacd-smoke"
              assert connection["network"]["mode"] == "local"
              assert connection["network"]["networkMagic"] == 42
              assert connection["network"]["localnetFingerprint"] == network["status"]["network"]["localnetFingerprint"]
              assert connection["primaryNodeToNode"]["host"] == "phase4-smoke-node.yacd-smoke.svc.cluster.local"
              assert connection["primaryNodeToNode"]["port"] == 3001
              assert connection["primaryNodeToNode"]["url"] == "tcp://phase4-smoke-node.yacd-smoke.svc.cluster.local:3001"
              for key in required:
                  assert key in data
              assert connection["files"]["primaryTopology"] == "primary-topology.json"
              PY
        - script:
            timeout: 8m
            workDir: ../../..
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              kubectl apply -f - <<'YAML'
              apiVersion: yacd.meigma.io/v1alpha1
              kind: CardanoDBSync
              metadata:
                name: phase6-managed
                namespace: yacd-smoke
              spec:
                networkRef:
                  name: phase4-smoke
                database:
                  managed: {}
              YAML

              for _ in $(seq 1 60); do
                if kubectl get secret -n yacd-smoke phase6-managed-postgres-auth >/dev/null 2>&1 &&
                  kubectl get pvc -n yacd-smoke phase6-managed-postgres-state >/dev/null 2>&1 &&
                  kubectl get service -n yacd-smoke phase6-managed-postgres >/dev/null 2>&1 &&
                  kubectl get deployment -n yacd-smoke phase6-managed-postgres >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done
              kubectl get secret -n yacd-smoke phase6-managed-postgres-auth
              kubectl get pvc -n yacd-smoke phase6-managed-postgres-state
              kubectl get service -n yacd-smoke phase6-managed-postgres
              kubectl get deployment -n yacd-smoke phase6-managed-postgres
              kubectl wait -n yacd-smoke --for=condition=Available deployment/phase6-managed-postgres --timeout=5m

              for _ in $(seq 1 60); do
                postgres_ready="$(kubectl get cardanodbsync -n yacd-smoke phase6-managed -o jsonpath='{.status.conditions[?(@.type=="PostgresReady")].status}' 2>/dev/null || true)"
                postgres_reason="$(kubectl get cardanodbsync -n yacd-smoke phase6-managed -o jsonpath='{.status.conditions[?(@.type=="PostgresReady")].reason}' 2>/dev/null || true)"
                synced="$(kubectl get cardanodbsync -n yacd-smoke phase6-managed -o jsonpath='{.status.conditions[?(@.type=="Synced")].status}' 2>/dev/null || true)"
                synced_reason="$(kubectl get cardanodbsync -n yacd-smoke phase6-managed -o jsonpath='{.status.conditions[?(@.type=="Synced")].reason}' 2>/dev/null || true)"
                service_name="$(kubectl get cardanodbsync -n yacd-smoke phase6-managed -o jsonpath='{.status.endpoints.postgres.serviceName}' 2>/dev/null || true)"
                port="$(kubectl get cardanodbsync -n yacd-smoke phase6-managed -o jsonpath='{.status.endpoints.postgres.port}' 2>/dev/null || true)"
                url="$(kubectl get cardanodbsync -n yacd-smoke phase6-managed -o jsonpath='{.status.endpoints.postgres.url}' 2>/dev/null || true)"
                auth_secret="$(kubectl get cardanodbsync -n yacd-smoke phase6-managed -o jsonpath='{.status.database.authSecretName}' 2>/dev/null || true)"
                if [ "${postgres_ready}" = "True" ] &&
                  [ "${postgres_reason}" = "PostgresReady" ] &&
                  [ "${synced}" = "False" ] &&
                  [ "${synced_reason}" = "SyncNotProbed" ] &&
                  [ "${service_name}" = "phase6-managed-postgres" ] &&
                  [ "${port}" = "5432" ] &&
                  [ "${url}" = "postgres://phase6-managed-postgres.yacd-smoke.svc.cluster.local:5432/cexplorer" ] &&
                  [ "${auth_secret}" = "phase6-managed-postgres-auth" ]; then
                  kubectl get deployment -n yacd-smoke phase6-managed-dbsync
                  exit 0
                fi
                kubectl get cardanodbsync -n yacd-smoke phase6-managed -o yaml || true
                sleep 5
              done
              exit 1
        - script:
            timeout: 3m
            workDir: ../../..
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              info_json="$(go run ./cli/cmd/yacd --namespace yacd-smoke info phase4-smoke --json)"
              printf '%s\n' "$info_json"
              INFO_JSON="$info_json" python3 - <<'PY'
              import json
              import os

              data = json.loads(os.environ["INFO_JSON"])
              assert data["name"] == "phase4-smoke"
              assert data["namespace"] == "yacd-smoke"
              assert data["endpoints"]["ogmios"]["url"] == "ws://phase4-smoke-ogmios.yacd-smoke.svc.cluster.local:1337"
              assert data["endpoints"]["kupo"]["url"] == "http://phase4-smoke-kupo.yacd-smoke.svc.cluster.local:1442"
              assert data["endpoints"]["faucet"]["url"] == "http://phase4-smoke-faucet.yacd-smoke.svc.cluster.local:8080"
              assert data["faucet"]["authSecretName"] == "phase4-smoke-faucet-auth"
              assert any(condition["type"] == "Ready" and condition["status"] == "True" for condition in data["conditions"])
              PY
              kubectl apply -f - <<'YAML'
              apiVersion: v1
              kind: Pod
              metadata:
                name: curl-ogmios
                namespace: yacd-smoke
              spec:
                restartPolicy: Never
                securityContext:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                volumes:
                  - name: tmp
                    emptyDir: {}
                containers:
                  - name: curl
                    image: curlimages/curl:8.11.1
                    volumeMounts:
                      - name: tmp
                        mountPath: /tmp
                    command:
                      - /bin/sh
                      - -c
                    args:
                      - |
                        for i in $(seq 1 30); do
                          status="$(curl -sS -o /tmp/ogmios-tip.json -w '%{http_code}' \
                            -H 'Content-Type: application/json' \
                            -d '{"jsonrpc":"2.0","method":"queryNetwork/tip","id":"chainsaw-smoke"}' \
                            http://phase4-smoke-ogmios.yacd-smoke.svc.cluster.local:1337 || true)"
                          echo "ogmios queryNetwork/tip status: ${status}"
                          cat /tmp/ogmios-tip.json || true
                          if [ "${status}" = "200" ] &&
                            grep -q '"method"[[:space:]]*:[[:space:]]*"queryNetwork/tip"' /tmp/ogmios-tip.json &&
                            grep -q '"result"[[:space:]]*:' /tmp/ogmios-tip.json; then
                            exit 0
                          fi
                          sleep 2
                        done
                        exit 1
                    securityContext:
                      readOnlyRootFilesystem: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      runAsNonRoot: true
                      runAsUser: 1000
                      seccompProfile:
                        type: RuntimeDefault
              ---
              apiVersion: v1
              kind: Pod
              metadata:
                name: curl-faucet
                namespace: yacd-smoke
              spec:
                restartPolicy: Never
                securityContext:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                volumes:
                  - name: tmp
                    emptyDir: {}
                containers:
                  - name: curl
                    image: curlimages/curl:8.11.1
                    env:
                      - name: FAUCET_TOKEN
                        valueFrom:
                          secretKeyRef:
                            name: phase4-smoke-faucet-auth
                            key: token
                    volumeMounts:
                      - name: tmp
                        mountPath: /tmp
                    command:
                      - /bin/sh
                      - -c
                    args:
                      - |
                        set -eu
                        for i in $(seq 1 30); do
                          ready_status="$(curl -sS -o /tmp/faucet-ready.json -w '%{http_code}' \
                            'http://phase4-smoke-faucet.yacd-smoke.svc.cluster.local:8080/readyz' || true)"
                          echo "faucet ready status: ${ready_status}"
                          cat /tmp/faucet-ready.json || true
                          if [ "${ready_status}" = "200" ]; then
                            break
                          fi
                          sleep 2
                        done
                        [ "${ready_status}" = "200" ]

                        unauthorized_status="$(curl -sS -o /tmp/faucet-unauthorized.json -w '%{http_code}' \
                          -H 'Content-Type: application/json' \
                          -d '{"address":"addr_test1invalid","lovelace":1000000}' \
                          'http://phase4-smoke-faucet.yacd-smoke.svc.cluster.local:8080/v1/topups' || true)"
                        echo "faucet unauthorized status: ${unauthorized_status}"
                        cat /tmp/faucet-unauthorized.json || true
                        [ "${unauthorized_status}" = "401" ]

                        authed_status="$(curl -sS -o /tmp/faucet-authed.json -w '%{http_code}' \
                          -H "Authorization: Bearer ${FAUCET_TOKEN}" \
                          -H 'Content-Type: application/json' \
                          -d '{"address":"","lovelace":1000000}' \
                          'http://phase4-smoke-faucet.yacd-smoke.svc.cluster.local:8080/v1/topups' || true)"
                        echo "faucet authed validation status: ${authed_status}"
                        cat /tmp/faucet-authed.json || true
                        [ "${authed_status}" = "400" ]

                        source_status="$(curl -sS -o /tmp/faucet-source.json -w '%{http_code}' \
                          'http://phase4-smoke-faucet.yacd-smoke.svc.cluster.local:8080/v1/sources/utxo1' || true)"
                        echo "faucet source status: ${source_status}"
                        cat /tmp/faucet-source.json || true
                        [ "${source_status}" = "200" ]
                        destination="$(sed -n 's/.*"address":"\([^"]*\)".*/\1/p' /tmp/faucet-source.json)"
                        [ -n "${destination}" ]

                        topup_status="$(curl -sS -o /tmp/faucet-topup.json -w '%{http_code}' \
                          -H "Authorization: Bearer ${FAUCET_TOKEN}" \
                          -H 'Content-Type: application/json' \
                          -d "{\"address\":\"${destination}\",\"lovelace\":1000000,\"source\":\"utxo2\"}" \
                          'http://phase4-smoke-faucet.yacd-smoke.svc.cluster.local:8080/v1/topups' || true)"
                        echo "faucet top-up status: ${topup_status}"
                        cat /tmp/faucet-topup.json || true
                        [ "${topup_status}" = "200" ]
                        grep -q '"txId"' /tmp/faucet-topup.json
                        grep -q '"source":"utxo2"' /tmp/faucet-topup.json
                        grep -q '"lovelace":1000000' /tmp/faucet-topup.json
                    securityContext:
                      readOnlyRootFilesystem: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      runAsNonRoot: true
                      runAsUser: 1000
                      seccompProfile:
                        type: RuntimeDefault
              ---
              apiVersion: v1
              kind: Pod
              metadata:
                name: curl-kupo
                namespace: yacd-smoke
              spec:
                restartPolicy: Never
                securityContext:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                volumes:
                  - name: tmp
                    emptyDir: {}
                containers:
                  - name: curl
                    image: curlimages/curl:8.11.1
                    volumeMounts:
                      - name: tmp
                        mountPath: /tmp
                    command:
                      - /bin/sh
                      - -c
                    args:
                      - |
                        for i in $(seq 1 30); do
                          status="$(curl -sS -o /tmp/kupo-matches.json -w '%{http_code}' \
                            'http://phase4-smoke-kupo.yacd-smoke.svc.cluster.local:1442/matches?unspent' || true)"
                          echo "kupo matches status: ${status}"
                          cat /tmp/kupo-matches.json || true
                          if [ "${status}" = "200" ]; then
                            exit 0
                          fi
                          sleep 2
                        done
                        exit 1
                    securityContext:
                      readOnlyRootFilesystem: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      runAsNonRoot: true
                      runAsUser: 1000
                      seccompProfile:
                        type: RuntimeDefault
              YAML
        - wait:
            apiVersion: v1
            kind: Pod
            namespace: yacd-smoke
            name: curl-ogmios
            timeout: 3m
            for:
              jsonPath:
                path: '{.status.phase}'
                value: Succeeded
        - wait:
            apiVersion: v1
            kind: Pod
            namespace: yacd-smoke
            name: curl-kupo
            timeout: 3m
            for:
              jsonPath:
                path: '{.status.phase}'
                value: Succeeded
        - wait:
            apiVersion: v1
            kind: Pod
            namespace: yacd-smoke
            name: curl-faucet
            timeout: 3m
            for:
              jsonPath:
                path: '{.status.phase}'
                value: Succeeded
        - script:
            timeout: 5m
            content: |
              set -euo pipefail
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              kubectl patch cardanonetwork -n yacd-smoke phase4-smoke --type=merge -p '{"spec":{"chainAPI":{"kupo":{"enabled":false,"image":"cardanosolutions/kupo:v2.11.0","port":1442},"faucet":{"enabled":false,"port":8080,"defaultSource":"utxo1","minTopUpLovelace":1000000,"maxTopUpLovelace":10000000000}}}}'
              for _ in $(seq 1 60); do
                if kubectl get service -n yacd-smoke phase4-smoke-kupo >/dev/null 2>&1; then
                  sleep 5
                  continue
                fi
                if kubectl get service -n yacd-smoke phase4-smoke-faucet >/dev/null 2>&1; then
                  sleep 5
                  continue
                fi
                if kubectl get secret -n yacd-smoke phase4-smoke-faucet-auth >/dev/null 2>&1; then
                  sleep 5
                  continue
                fi
                ready="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)"
                node_ready="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.conditions[?(@.type=="NodeReady")].status}' 2>/dev/null || true)"
                artifacts_ready="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.conditions[?(@.type=="ArtifactsReady")].status}' 2>/dev/null || true)"
                ogmios_ready="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.conditions[?(@.type=="OgmiosReady")].status}' 2>/dev/null || true)"
                kupo_ready="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.conditions[?(@.type=="KupoReady")].status}' 2>/dev/null || true)"
                kupo_reason="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.conditions[?(@.type=="KupoReady")].reason}' 2>/dev/null || true)"
                faucet_ready="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.conditions[?(@.type=="FaucetReady")].status}' 2>/dev/null || true)"
                faucet_reason="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.conditions[?(@.type=="FaucetReady")].reason}' 2>/dev/null || true)"
                kupo_endpoint="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.endpoints.kupo.serviceName}' 2>/dev/null || true)"
                faucet_endpoint="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.endpoints.faucet.serviceName}' 2>/dev/null || true)"
                faucet_auth_secret="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.faucet.authSecretName}' 2>/dev/null || true)"
                artifacts_configmap="$(kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o jsonpath='{.status.artifacts.networkConfigMapName}' 2>/dev/null || true)"
                if [ "${ready}" = "True" ] &&
                  [ "${node_ready}" = "True" ] &&
                  [ "${artifacts_ready}" = "True" ] &&
                  [ "${ogmios_ready}" = "True" ] &&
                  [ "${kupo_ready}" = "False" ] &&
                  [ "${kupo_reason}" = "KupoDisabled" ] &&
                  [ "${faucet_ready}" = "False" ] &&
                  [ "${faucet_reason}" = "FaucetDisabled" ] &&
                  [ -z "${kupo_endpoint}" ] &&
                  [ -z "${faucet_endpoint}" ] &&
                  [ -z "${faucet_auth_secret}" ] &&
                  [ "${artifacts_configmap}" = "phase4-smoke-network-artifacts" ]; then
                  exit 0
                fi
                kubectl get cardanonetwork -n yacd-smoke phase4-smoke -o yaml || true
                sleep 5
              done
              exit 1
      cleanup:
        - script:
            timeout: 5m
            workDir: ../../..
            content: |
              set +e
              export KUBECTL_KUBERC="${KUBECTL_KUBERC:-false}"
              kubectl delete namespace yacd-smoke --ignore-not-found=true || true
              kubectl delete pod curl-metrics -n yacd-system --ignore-not-found=true || true
              kubectl delete clusterrolebinding yacd-metrics-smoke --ignore-not-found=true || true
              kubectl delete serviceaccount metrics-smoke -n yacd-system --ignore-not-found=true || true
              moon run root:undeploy || true
              kubectl delete namespace yacd-system --ignore-not-found=true || true
              exit 0
