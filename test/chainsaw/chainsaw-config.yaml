apiVersion: chainsaw.kyverno.io/v1alpha2
kind: Configuration
metadata:
  name: yacd-e2e
spec:
  discovery:
    testFile: chainsaw-test
  execution:
    failFast: true
    parallel: 1
  namespace:
    template:
      metadata:
        labels:
          pod-security.kubernetes.io/enforce: restricted
  cleanup:
    skipDelete: false
  timeouts:
    apply: 30s
    assert: 3m
    cleanup: 2m
    delete: 1m
    error: 1m
    exec: 5m
