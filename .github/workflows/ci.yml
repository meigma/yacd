name: CI

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Moon Toolchain
        uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
        with:
          auto-install: true
          auto-setup: true
          cache-base: ${{ github.event.repository.default_branch }}

      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-

      - name: Cache Go build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('.go-version', 'go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-build-${{ hashFiles('.go-version', 'go.sum') }}-
            ${{ runner.os }}-go-build-

      - name: Cache golangci-lint
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/golangci-lint
          key: ${{ runner.os }}-golangci-lint-${{ hashFiles('.go-version', '.golangci.yml', '.prototools', '.moon/proto/golangci-lint.toml', 'go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-golangci-lint-${{ hashFiles('.go-version', '.golangci.yml', '.prototools', '.moon/proto/golangci-lint.toml', 'go.sum') }}-
            ${{ runner.os }}-golangci-lint-

      - name: Run static checks
        run: moon run root:check --summary minimal

      - name: Run tests
        run: moon run root:test --summary minimal

      - name: Check whitespace
        run: git diff --check

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Moon Toolchain
        uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
        with:
          auto-install: true
          auto-setup: true
          cache-base: ${{ github.event.repository.default_branch }}

      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-

      - name: Cache Go build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-e2e-${{ hashFiles('.go-version', 'go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-build-e2e-${{ hashFiles('.go-version', 'go.sum') }}-
            ${{ runner.os }}-go-build-e2e-

      # KinD + Chainsaw smoke. setup-toolchain installs the proto-pinned
      # kind/chainsaw/kubectl/helm/ko; Docker is preinstalled on the runner.
      - name: Run e2e (KinD + Chainsaw)
        run: moon run root:test-e2e --summary minimal

  # Build the cardano-tools image on every PR (linux/amd64 only) so Dockerfile,
  # build-context, IOG tarball, and static-linkage regressions are caught
  # per-PR instead of only in the release-please dry-run. The Dockerfile's
  # static-musl guard runs inside this build.
  cardano-tools-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build cardano-tools image (linux/amd64)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: containers/cardano-tools/Dockerfile
          platforms: linux/amd64
          load: true
          tags: cardano-tools:ci
          cache-from: type=gha,scope=cardano-tools-ci-amd64
          cache-to: type=gha,mode=max,scope=cardano-tools-ci-amd64
          build-args: |
            YACD_CARDANO_TOOLS_VERSION=0.0.0-ci.${{ github.run_id }}.${{ github.run_attempt }}
            YACD_CARDANO_TOOLS_COMMIT=${{ github.sha }}
            YACD_CARDANO_TOOLS_DATE=ci

      - name: Smoke test (distroless, no shell)
        run: |
          set -euo pipefail
          docker run --rm cardano-tools:ci version | grep -Fq "yacd-cardano-tools"
          docker run --rm cardano-tools:ci generate --dry-run >/dev/null
