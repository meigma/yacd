# This workflow is tag-triggered by the cardano-testnet Release Please train.
# It publishes the YACD cardano-testnet tools image to GHCR, attaches
# BuildKit provenance/SBOM metadata, and publishes a GitHub-native attestation
# for the final multi-platform OCI manifest.

name: Release cardano-testnet Image

on:
  push:
    tags:
      - cardano-testnet/v*
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release
        required: true
        type: string

permissions: {}

env:
  IMAGE_NAME: ghcr.io/meigma/yacd/cardano-testnet

jobs:
  resolve-release:
    name: Resolve cardano-testnet Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release-tag.outputs.tag }}
      version: ${{ steps.release-tag.outputs.version }}
      upstream-version: ${{ steps.release-tag.outputs.upstream-version }}
    steps:
      - name: Resolve release tag
        id: release-tag
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$DISPATCH_TAG"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^cardano-testnet/v[0-9]+\.[0-9]+\.[0-9]+-yacd\.[0-9]+$ ]]; then
            echo "Release tag must match cardano-testnet/vX.Y.Z-yacd.N: $tag" >&2
            exit 1
          fi

          version="${tag#cardano-testnet/v}"
          upstream_version="${version%%-yacd.*}"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "upstream-version=$upstream_version" >> "$GITHUB_OUTPUT"

      - name: Wait for draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          for attempt in $(seq 1 30); do
            if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft' 2>/dev/null | grep -qx true; then
              exit 0
            fi
            echo "Draft release $RELEASE_TAG is not ready yet; retrying..."
            sleep 10
          done

          echo "Draft release $RELEASE_TAG was not found or is not a draft." >&2
          exit 1

  cardano-testnet-image-build:
    name: cardano-testnet Image Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs:
      - resolve-release
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check out requested tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: git checkout --detach "$RELEASE_TAG"

      - name: Resolve image metadata
        id: image
        env:
          RELEASE_VERSION: ${{ needs.resolve-release.outputs.version }}
        run: |
          set -euo pipefail

          echo "name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE_NAME}:${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ needs.resolve-release.outputs.version }}
          labels: |
            org.opencontainers.image.title=yacd-cardano-testnet
            org.opencontainers.image.description=YACD cardano-testnet tools image built from official IntersectMBO release artifacts
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.resolve-release.outputs.version }}
            org.opencontainers.image.revision=${{ steps.image.outputs.commit }}
            io.yacd.cardano-node.version=${{ needs.resolve-release.outputs.upstream-version }}

      - name: Build and push cardano-testnet image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: containers/cardano-testnet
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=cardano-testnet-release-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=cardano-testnet-release-${{ matrix.arch }}
          build-args: |
            CARDANO_NODE_VERSION=${{ needs.resolve-release.outputs.upstream-version }}
            YACD_CARDANO_TESTNET_VERSION=${{ steps.image.outputs.version }}
            YACD_PUBLISHER_VERSION=${{ steps.image.outputs.version }}
            YACD_PUBLISHER_COMMIT=${{ steps.image.outputs.commit }}
            YACD_PUBLISHER_DATE=${{ steps.image.outputs.date }}

      - name: Smoke test platform image
        env:
          IMAGE_REF: ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          docker run --rm --platform "${{ matrix.platform }}" "$IMAGE_REF" version >/tmp/cardano-testnet-version.txt
          grep -Fq "cardano-node" /tmp/cardano-testnet-version.txt

      - name: Export platform digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "unexpected image digest: $DIGEST" >&2
            exit 1
          fi

          mkdir -p /tmp/cardano-testnet-digests
          touch "/tmp/cardano-testnet-digests/${DIGEST#sha256:}"

      - name: Upload platform digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cardano-testnet-digest-${{ matrix.arch }}
          path: /tmp/cardano-testnet-digests/*
          if-no-files-found: error
          retention-days: 1

  cardano-testnet-image-release:
    name: cardano-testnet Image Release
    runs-on: ubuntu-24.04
    needs:
      - resolve-release
      - cardano-testnet-image-build
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      image-name: ${{ steps.manifest.outputs.name }}
      image-tag: ${{ steps.manifest.outputs.tag }}
      image-digest: ${{ steps.manifest.outputs.digest }}
    steps:
      - name: Resolve image metadata
        id: image
        env:
          RELEASE_VERSION: ${{ needs.resolve-release.outputs.version }}
        run: |
          set -euo pipefail

          echo "name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE_NAME}:${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Download platform digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cardano-testnet-digest-*
          path: /tmp/cardano-testnet-digests
          merge-multiple: true

      - name: Create multi-platform manifest
        id: manifest
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          set -euo pipefail

          mapfile -t digest_files < <(find /tmp/cardano-testnet-digests -maxdepth 1 -type f -print | sort)
          if [ "${#digest_files[@]}" -ne 2 ]; then
            echo "expected 2 platform digest files, found ${#digest_files[@]}" >&2
            printf '%s\n' "${digest_files[@]}" >&2
            exit 1
          fi

          refs=()
          for digest_file in "${digest_files[@]}"; do
            digest="$(basename "$digest_file")"
            if [[ ! "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              echo "unexpected digest artifact name: $digest" >&2
              exit 1
            fi
            refs+=("${IMAGE_NAME}@sha256:${digest}")
          done

          docker buildx imagetools create --tag "$IMAGE_TAG" "${refs[@]}"

          manifest_json="$(docker buildx imagetools inspect "$IMAGE_TAG" --format '{{json .}}')"
          manifest_digest="$(jq -r '.manifest.digest' <<< "$manifest_json")"
          platforms="$(jq -r '
            [
              .manifest.manifests[]
              | select(.platform.os == "linux" and (.platform.architecture == "amd64" or .platform.architecture == "arm64"))
              | "\(.platform.os)/\(.platform.architecture)"
            ]
            | unique
            | join(",")
          ' <<< "$manifest_json")"

          if [[ ! "$manifest_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "unexpected manifest digest: $manifest_digest" >&2
            exit 1
          fi

          if [ "$platforms" != "linux/amd64,linux/arm64" ]; then
            echo "unexpected manifest platforms: $platforms" >&2
            exit 1
          fi

          echo "name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "digest=${manifest_digest}" >> "$GITHUB_OUTPUT"

      - name: Smoke test release image
        run: |
          set -euo pipefail

          docker run --rm "${{ steps.manifest.outputs.tag }}" version >/tmp/cardano-testnet-version.txt
          grep -Fq "cardano-node" /tmp/cardano-testnet-version.txt
          docker run --rm --entrypoint /bin/sh "${{ steps.manifest.outputs.tag }}" \
            -c 'test -x /opt/yacd/bin/yacd-cardano-testnet-publisher'

          state_dir="$(mktemp -d)"
          chmod 0777 "$state_dir"
          cleanup_state_dir() {
            docker run --rm --user 0 \
              --entrypoint /bin/sh \
              -v "${state_dir}:/state" \
              "${{ steps.manifest.outputs.tag }}" \
              -c 'chmod -R a+rwX /state' >/dev/null 2>&1 || true
            rm -rf "$state_dir"
          }
          trap cleanup_state_dir EXIT

          manifest='{"schemaVersion":"release-smoke","inputs":{"networkMagic":42,"poolCount":1,"epochLength":500,"slotLength":"0.1","envDir":"/state/env"},"fingerprint":{"algorithm":"sha256","value":"release-smoke"}}'
          docker run --rm --read-only \
            --entrypoint /opt/yacd/bin/yacd-cardano-testnet-init \
            -v "${state_dir}:/state" \
            -e YACD_LOCALNET_ENV_DIR=/state/env \
            -e YACD_LOCALNET_CONFIG_FILE=/state/env/configuration.yaml \
            -e YACD_LOCALNET_PLAN_MANIFEST_FILE=/state/env/yacd-localnet-plan.json \
            -e YACD_LOCALNET_PLAN_MANIFEST="$manifest" \
            "${{ steps.manifest.outputs.tag }}" \
            create-env \
            --num-pool-nodes 1 \
            --testnet-magic 42 \
            --epoch-length 500 \
            --slot-length 0.1 \
            --output /state/env

          docker run --rm --read-only \
            --entrypoint /opt/yacd/bin/yacd-cardano-testnet-init \
            -v "${state_dir}:/state" \
            -e YACD_LOCALNET_ENV_DIR=/state/env \
            -e YACD_LOCALNET_CONFIG_FILE=/state/env/configuration.yaml \
            -e YACD_LOCALNET_PLAN_MANIFEST_FILE=/state/env/yacd-localnet-plan.json \
            -e YACD_LOCALNET_PLAN_MANIFEST="$manifest" \
            "${{ steps.manifest.outputs.tag }}" \
            create-env \
            --num-pool-nodes 1 \
            --testnet-magic 42 \
            --epoch-length 500 \
            --slot-length 0.1 \
            --output /state/env

          test -f "${state_dir}/env/yacd-localnet-plan.json"

      - name: Attest cardano-testnet image
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ steps.manifest.outputs.name }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

  release-inspection-summary:
    name: cardano-testnet Release Inspection Summary
    runs-on: ubuntu-24.04
    needs:
      - resolve-release
      - cardano-testnet-image-release
    permissions: {}
    steps:
      - name: Write inspection summary
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
          IMAGE_NAME: ${{ needs.cardano-testnet-image-release.outputs.image-name }}
          IMAGE_TAG: ${{ needs.cardano-testnet-image-release.outputs.image-tag }}
          IMAGE_DIGEST: ${{ needs.cardano-testnet-image-release.outputs.image-digest }}
        run: |
          {
            echo "## cardano-testnet tools image ready for inspection"
            echo
            echo "Release: $RELEASE_TAG"
            echo "Image: $IMAGE_TAG"
            echo
            echo "Container verification commands:"
            echo
            echo '```sh'
            echo "docker login ghcr.io"
            echo "docker pull \"${IMAGE_TAG}\""
            echo "docker run --rm \"${IMAGE_TAG}\" version"
            echo "gh attestation verify \"oci://${IMAGE_NAME}@${IMAGE_DIGEST}\" --repo \"$GITHUB_REPOSITORY\" --signer-workflow \"$GITHUB_REPOSITORY/.github/workflows/release-cardano-testnet.yml\" --source-ref \"refs/tags/$RELEASE_TAG\" --deny-self-hosted-runners"
            echo '```'
            echo
            echo "Publish or reject the draft GitHub release manually after inspection. The GHCR image is already available because GHCR does not have a draft release state."
          } >> "$GITHUB_STEP_SUMMARY"
