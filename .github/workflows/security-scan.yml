name: Security Scan

on:
  schedule:
    - cron: "37 9 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  container-vulnerability-scan:
    name: Container Vulnerability Scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve scan metadata
        id: scan
        run: |
          {
            echo "version=security-scan-${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
            echo "commit=${GITHUB_SHA}"
            echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "source=https://github.com/${GITHUB_REPOSITORY}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build local scan image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: yacd:security-scan
          cache-from: type=gha,scope=yacd-security-scan
          cache-to: type=gha,mode=max,scope=yacd-security-scan
          build-args: |
            VERSION=${{ steps.scan.outputs.version }}
            COMMIT=${{ steps.scan.outputs.commit }}
            DATE=${{ steps.scan.outputs.date }}
            SOURCE=${{ steps.scan.outputs.source }}

      - name: Scan local image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: yacd:security-scan
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          hide-progress: true
          limit-severities-for-sarif: true

      - name: Upload scan results
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: trivy-results.sarif
          category: container-vulnerability-scan
