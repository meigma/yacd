# This workflow rehearses the release paths without uploading GitHub release
# assets or publishing OCI artifacts. It is intended for release PRs and manual
# checks before changing release automation.
#
# Keep the pull_request trigger broad so required check contexts still report
# on normal PRs. The jobs intentionally skip unless the PR head branch is a
# Release Please branch, which avoids spending runner time on routine changes.

name: Release Dry Run

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions: {}

env:
  IMAGE_NAME: ghcr.io/meigma/yacd
  CHART_REF: oci://ghcr.io/meigma/yacd/chart

jobs:
  binary-release-dry-run:
    name: Binary Release Dry Run
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .go-version
          cache: true

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Create synthetic release tag
        env:
          DRY_RUN_TAG: v0.0.0-dryrun.${{ github.run_id }}.${{ github.run_attempt }}
        run: |
          git tag -f "$DRY_RUN_TAG"

      - name: Run GoReleaser without publishing
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GORELEASER_CURRENT_TAG: v0.0.0-dryrun.${{ github.run_id }}.${{ github.run_attempt }}

      - name: Validate dry-run artifacts
        run: |
          set -euo pipefail

          version="0.0.0-dryrun.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          binary_name="yacd"
          asset_prefix="${binary_name}_"

          jq -e --arg asset_prefix "$asset_prefix" '
            [
              .[]
              | select(
                  (.type == "Binary" and (.name | startswith($asset_prefix))) or
                  (.type == "SBOM" and (.name | startswith($asset_prefix))) or
                  (.type == "Checksum" and .name == "checksums.txt")
                )
            ] as $artifacts
            | ($artifacts | map(select(.type == "Binary")) | length) == 4
            and ($artifacts | map(select(.type == "SBOM")) | length) == 4
            and ($artifacts | map(select(.type == "Checksum")) | length) == 1
          ' dist/artifacts.json

          test -f dist/checksums.txt

          for os in darwin linux; do
            for arch in amd64 arm64; do
              expected="${binary_name}_${version}_${os}_${arch}"
              expected_sbom="${expected}.sbom.json"

              jq -e --arg name "$expected" '.[] | select(.type == "Binary" and .name == $name)' dist/artifacts.json >/dev/null
              jq -e --arg name "$expected_sbom" '.[] | select(.type == "SBOM" and .name == $name)' dist/artifacts.json >/dev/null
              awk -v name="$expected" '$2 == name && length($1) == 64 && $1 ~ /^[[:xdigit:]]+$/ { found = 1 } END { exit(found ? 0 : 1) }' dist/checksums.txt
            done
          done

      - name: Smoke test dry-run binary
        run: |
          set -euo pipefail

          version="0.0.0-dryrun.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          binary_name="yacd"
          host_os="$(go env GOHOSTOS)"
          host_arch="$(go env GOHOSTARCH)"
          expected="${binary_name}_${version}_${host_os}_${host_arch}"
          bin="$(jq -r --arg name "$expected" '.[] | select(.type == "Binary" and .name == $name) | .path' dist/artifacts.json)"

          if [ -z "$bin" ] || [ "$bin" = "null" ] || [ ! -f "$bin" ]; then
            echo "failed to locate host binary artifact $expected" >&2
            jq . dist/artifacts.json >&2
            exit 1
          fi

          set +e
          "$bin" --help >/tmp/yacd-help.txt 2>&1
          rc="$?"
          set -e
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then
            exit "$rc"
          fi
          test -s /tmp/yacd-help.txt

  container-image-platform-dry-run:
    name: Container Image Platform Dry Run (${{ matrix.platform }})
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please--') }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Resolve dry-run metadata
        id: dry-run
        env:
          DRY_RUN_VERSION: 0.0.0-dryrun.${{ github.run_id }}.${{ github.run_attempt }}
        run: |
          set -euo pipefail

          echo "version=${DRY_RUN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build platform OCI archive
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: false
          platforms: ${{ matrix.platform }}
          outputs: type=oci,dest=/tmp/yacd-dry-run-${{ matrix.arch }}.oci
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=yacd-release-dry-run-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=yacd-release-dry-run-${{ matrix.arch }}
          build-args: |
            VERSION=${{ steps.dry-run.outputs.version }}
            COMMIT=${{ steps.dry-run.outputs.commit }}
            DATE=${{ steps.dry-run.outputs.date }}
            SOURCE=https://github.com/${{ github.repository }}

      - name: Validate platform OCI archive
        run: test -s /tmp/yacd-dry-run-${{ matrix.arch }}.oci

  container-image-dry-run:
    name: Container Image Dry Run
    needs:
      - container-image-platform-dry-run
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please--')) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check platform dry-run result
        env:
          PLATFORM_RESULT: ${{ needs.container-image-platform-dry-run.result }}
        run: |
          set -euo pipefail

          if [ "$PLATFORM_RESULT" != "success" ]; then
            echo "container platform dry-run result was $PLATFORM_RESULT" >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Resolve dry-run metadata
        id: dry-run
        env:
          DRY_RUN_VERSION: 0.0.0-dryrun.${{ github.run_id }}.${{ github.run_attempt }}
        run: |
          set -euo pipefail

          echo "version=${DRY_RUN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build local smoke-test image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: yacd:dry-run
          cache-from: type=gha,scope=yacd-release-dry-run-amd64
          cache-to: type=gha,mode=max,scope=yacd-release-dry-run-amd64
          build-args: |
            VERSION=${{ steps.dry-run.outputs.version }}
            COMMIT=${{ steps.dry-run.outputs.commit }}
            DATE=${{ steps.dry-run.outputs.date }}
            SOURCE=https://github.com/${{ github.repository }}

      - name: Smoke test local image
        run: |
          set -euo pipefail

          set +e
          docker run --rm yacd:dry-run --help >/tmp/yacd-image-help.txt 2>&1
          rc="$?"
          set -e
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then
            exit "$rc"
          fi
          test -s /tmp/yacd-image-help.txt

  cardano-testnet-image-platform-dry-run:
    name: cardano-testnet Image Platform Dry Run (${{ matrix.platform }})
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please--') }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build cardano-testnet platform OCI archive
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: containers/cardano-testnet
          push: false
          platforms: ${{ matrix.platform }}
          outputs: type=oci,dest=/tmp/cardano-testnet-dry-run-${{ matrix.arch }}.oci
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=cardano-testnet-release-dry-run-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=cardano-testnet-release-dry-run-${{ matrix.arch }}
          build-args: |
            CARDANO_NODE_VERSION=11.0.1
            YACD_CARDANO_TESTNET_VERSION=11.0.1-yacd.${{ github.run_id }}.${{ github.run_attempt }}
            YACD_PUBLISHER_VERSION=11.0.1-yacd.${{ github.run_id }}.${{ github.run_attempt }}
            YACD_PUBLISHER_COMMIT=${{ github.sha }}
            YACD_PUBLISHER_DATE=dryrun

      - name: Validate cardano-testnet platform OCI archive
        run: test -s /tmp/cardano-testnet-dry-run-${{ matrix.arch }}.oci

  cardano-testnet-image-dry-run:
    name: Cardano Testnet Image Dry Run
    needs:
      - cardano-testnet-image-platform-dry-run
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please--')) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check cardano-testnet platform dry-run result
        env:
          PLATFORM_RESULT: ${{ needs.cardano-testnet-image-platform-dry-run.result }}
        run: |
          set -euo pipefail

          if [ "$PLATFORM_RESULT" != "success" ]; then
            echo "cardano-testnet platform dry-run result was $PLATFORM_RESULT" >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build local cardano-testnet smoke-test image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: containers/cardano-testnet
          load: true
          platforms: linux/amd64
          tags: cardano-testnet:dry-run
          cache-from: type=gha,scope=cardano-testnet-release-dry-run-amd64
          cache-to: type=gha,mode=max,scope=cardano-testnet-release-dry-run-amd64
          build-args: |
            CARDANO_NODE_VERSION=11.0.1
            YACD_CARDANO_TESTNET_VERSION=11.0.1-yacd.${{ github.run_id }}.${{ github.run_attempt }}
            YACD_PUBLISHER_VERSION=11.0.1-yacd.${{ github.run_id }}.${{ github.run_attempt }}
            YACD_PUBLISHER_COMMIT=${{ github.sha }}
            YACD_PUBLISHER_DATE=dryrun

      - name: Smoke test local cardano-testnet image
        run: |
          set -euo pipefail

          docker run --rm cardano-testnet:dry-run version >/tmp/cardano-testnet-version.txt
          grep -Fq "cardano-node" /tmp/cardano-testnet-version.txt
          docker run --rm --entrypoint /bin/sh cardano-testnet:dry-run \
            -c 'test -x /opt/yacd/bin/yacd-cardano-testnet-publisher'

          state_dir="$(mktemp -d)"
          chmod 0777 "$state_dir"
          cleanup_state_dir() {
            docker run --rm --user 0 \
              --entrypoint /bin/sh \
              -v "${state_dir}:/state" \
              cardano-testnet:dry-run \
              -c 'chmod -R a+rwX /state' >/dev/null 2>&1 || true
            rm -rf "$state_dir"
          }
          trap cleanup_state_dir EXIT

          manifest='{"schemaVersion":"release-dry-run","inputs":{"networkMagic":42,"poolCount":1,"epochLength":500,"slotLength":"0.1","envDir":"/state/env"},"fingerprint":{"algorithm":"sha256","value":"release-dry-run"}}'
          docker run --rm --read-only \
            --entrypoint /opt/yacd/bin/yacd-cardano-testnet-init \
            -v "${state_dir}:/state" \
            -e YACD_LOCALNET_ENV_DIR=/state/env \
            -e YACD_LOCALNET_CONFIG_FILE=/state/env/configuration.yaml \
            -e YACD_LOCALNET_PLAN_MANIFEST_FILE=/state/env/yacd-localnet-plan.json \
            -e YACD_LOCALNET_PLAN_MANIFEST="$manifest" \
            cardano-testnet:dry-run \
            create-env \
            --num-pool-nodes 1 \
            --testnet-magic 42 \
            --epoch-length 500 \
            --slot-length 0.1 \
            --output /state/env

          docker run --rm --read-only \
            --entrypoint /opt/yacd/bin/yacd-cardano-testnet-init \
            -v "${state_dir}:/state" \
            -e YACD_LOCALNET_ENV_DIR=/state/env \
            -e YACD_LOCALNET_CONFIG_FILE=/state/env/configuration.yaml \
            -e YACD_LOCALNET_PLAN_MANIFEST_FILE=/state/env/yacd-localnet-plan.json \
            -e YACD_LOCALNET_PLAN_MANIFEST="$manifest" \
            cardano-testnet:dry-run \
            create-env \
            --num-pool-nodes 1 \
            --testnet-magic 42 \
            --epoch-length 500 \
            --slot-length 0.1 \
            --output /state/env

          test -f "${state_dir}/env/yacd-localnet-plan.json"

  cardano-tools-image-platform-dry-run:
    name: cardano-tools Image Platform Dry Run (${{ matrix.platform }})
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please--') }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build cardano-tools platform OCI archive
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: containers/cardano-tools/Dockerfile
          push: false
          platforms: ${{ matrix.platform }}
          outputs: type=oci,dest=/tmp/cardano-tools-dry-run-${{ matrix.arch }}.oci
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=cardano-tools-release-dry-run-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=cardano-tools-release-dry-run-${{ matrix.arch }}
          build-args: |
            CARDANO_NODE_VERSION=11.0.1
            YACD_CARDANO_TOOLS_VERSION=11.0.1-yacd.${{ github.run_id }}.${{ github.run_attempt }}
            YACD_CARDANO_TOOLS_COMMIT=${{ github.sha }}
            YACD_CARDANO_TOOLS_DATE=dryrun

      - name: Validate cardano-tools platform OCI archive
        run: test -s /tmp/cardano-tools-dry-run-${{ matrix.arch }}.oci

  cardano-tools-image-dry-run:
    name: Cardano Tools Image Dry Run
    needs:
      - cardano-tools-image-platform-dry-run
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please--')) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check cardano-tools platform dry-run result
        env:
          PLATFORM_RESULT: ${{ needs.cardano-tools-image-platform-dry-run.result }}
        run: |
          set -euo pipefail

          if [ "$PLATFORM_RESULT" != "success" ]; then
            echo "cardano-tools platform dry-run result was $PLATFORM_RESULT" >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build local cardano-tools smoke-test image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: containers/cardano-tools/Dockerfile
          load: true
          platforms: linux/amd64
          tags: cardano-tools:dry-run
          cache-from: type=gha,scope=cardano-tools-release-dry-run-amd64
          cache-to: type=gha,mode=max,scope=cardano-tools-release-dry-run-amd64
          build-args: |
            CARDANO_NODE_VERSION=11.0.1
            YACD_CARDANO_TOOLS_VERSION=11.0.1-yacd.${{ github.run_id }}.${{ github.run_attempt }}
            YACD_CARDANO_TOOLS_COMMIT=${{ github.sha }}
            YACD_CARDANO_TOOLS_DATE=dryrun

      - name: Smoke test local cardano-tools image
        run: |
          set -euo pipefail

          # distroless/static has no shell; probe binaries directly.
          docker run --rm cardano-tools:dry-run version >/tmp/cardano-tools-version.txt
          grep -Fq "yacd-cardano-tools" /tmp/cardano-tools-version.txt
          docker run --rm --entrypoint /opt/cardano/bin/cardano-cli cardano-tools:dry-run --version >/dev/null
          docker run --rm --entrypoint /opt/cardano/bin/cardano-node cardano-tools:dry-run --version >/dev/null

          docker run --rm cardano-tools:dry-run generate --dry-run >/tmp/cardano-tools-generate.txt
          grep -Fq "would run: cardano-testnet create-env" /tmp/cardano-tools-generate.txt

          docker run --rm cardano-tools:dry-run fetch --profile preview --dry-run >/tmp/cardano-tools-fetch.txt
          grep -Fq "config.json" /tmp/cardano-tools-fetch.txt

  helm-chart-dry-run:
    name: Helm Chart Dry Run
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Moon toolchain
        uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
        with:
          auto-install: true
          auto-setup: true
          cache-base: ${{ github.event.repository.default_branch }}

      - name: Package chart without publishing
        env:
          DRY_RUN_VERSION: 0.0.0-dryrun.${{ github.run_id }}.${{ github.run_attempt }}
        run: |
          set -euo pipefail

          chart="charts/yacd"
          package_dir="$(mktemp -d)"
          metadata="$(helm show chart "$chart")"
          chart_name="$(awk '/^name:/ { print $2; exit }' <<<"$metadata")"

          if [ "$chart_name" != "chart" ]; then
            echo "Chart.yaml name must be chart for ${CHART_REF}, got $chart_name" >&2
            exit 1
          fi

          helm lint "$chart"
          helm package "$chart" \
            --version "$DRY_RUN_VERSION" \
            --app-version "v${DRY_RUN_VERSION}" \
            --destination "$package_dir"

          archive="$package_dir/chart-${DRY_RUN_VERSION}.tgz"
          test -f "$archive"

          packaged_metadata="$(helm show chart "$archive")"
          packaged_name="$(awk '/^name:/ { print $2; exit }' <<<"$packaged_metadata")"
          packaged_version="$(awk '/^version:/ { print $2; exit }' <<<"$packaged_metadata")"
          packaged_app_version="$(awk '/^appVersion:/ { print $2; exit }' <<<"$packaged_metadata")"

          if [ "$packaged_name" != "chart" ]; then
            echo "packaged chart name must be chart, got $packaged_name" >&2
            exit 1
          fi
          if [ "$packaged_version" != "$DRY_RUN_VERSION" ]; then
            echo "packaged chart version must be $DRY_RUN_VERSION, got $packaged_version" >&2
            exit 1
          fi
          if [ "$packaged_app_version" != "v${DRY_RUN_VERSION}" ]; then
            echo "packaged chart appVersion must be v${DRY_RUN_VERSION}, got $packaged_app_version" >&2
            exit 1
          fi

          helm template yacd "$archive" --namespace yacd-system --include-crds >/tmp/yacd-chart.yaml
          grep -Fq "name: yacd-controller-manager" /tmp/yacd-chart.yaml
          grep -Fq "app.kubernetes.io/name: yacd" /tmp/yacd-chart.yaml
          grep -Fq "helm.sh/chart: chart-${DRY_RUN_VERSION}" /tmp/yacd-chart.yaml
          grep -Fq "image: \"${IMAGE_NAME}:v${DRY_RUN_VERSION}\"" /tmp/yacd-chart.yaml
          helm install yacd "$archive" --namespace yacd-system --dry-run=client --server-side=false >/dev/null

          echo "Dry-run chart package: $archive"
          echo "Dry-run OCI ref: ${CHART_REF}:${DRY_RUN_VERSION}"
