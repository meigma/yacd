# Required release app settings:
# - vars.MEIGMA_RELEASE_APP_ID
# - secrets.MEIGMA_RELEASE_APP_PRIVATE_KEY
# - protected-tag ruleset bypass for the release app, because this workflow
#   creates protected v* tags after the release PR is merged.

name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions: {}

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Create release app token
        id: release-app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.MEIGMA_RELEASE_APP_ID }}
          private-key: ${{ secrets.MEIGMA_RELEASE_APP_PRIVATE_KEY }}

      - name: Run Release Please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.release-app.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
