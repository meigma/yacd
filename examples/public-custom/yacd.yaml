apiVersion: yacd.meigma.io/devconfig/v1alpha1
kind: Environment
metadata:
  name: custom-public
  namespace: yacd-dev
spec:
  network:
    mode: public
    node:
      version: "11.0.1"
      port: 3001
      storage:
        size: 20Gi
    public:
      profile: custom
      configSource:
        configMapRef:
          name: custom-profile
