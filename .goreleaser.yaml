version: 2

project_name: template-k8s

builds:
  - id: template-k8s
    main: ./cmd
    binary: template-k8s
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -buildid=
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: template-k8s
    ids:
      - template-k8s
    formats:
      - binary
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

sboms:
  - id: binary
    artifacts: binary

changelog:
  disable: true

release:
  disable: true
