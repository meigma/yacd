{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "yacd.managerRoleName" . }}
  labels:
    {{- include "yacd.labels" . | nindent 4 }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
rules:
  - apiGroups:
      - yacd.meigma.io
    resources:
      - cardanonetworks
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "yacd.managerRoleBindingName" . }}
  labels:
    {{- include "yacd.labels" . | nindent 4 }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "yacd.managerRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "yacd.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
