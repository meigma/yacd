{{- if and .Values.rbac.create .Values.rbac.metricsReader.create .Values.metrics.enabled .Values.metrics.secure }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "yacd.metricsReaderRoleName" . }}
  labels:
    {{- include "yacd.labels" . | nindent 4 }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
rules:
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
{{- end }}
