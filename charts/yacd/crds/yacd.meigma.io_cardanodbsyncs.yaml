                            type: string
                          statePVCName:
                            description: statePVCName is the db-sync state PVC name.
                            type: string
                        type: object
                      revision:
                        description: |-
                          revision is an opaque sha256 rollout revision over all sidecar-mounted
                          material.
                        type: string
                    type: object
                type: object
              sync:
                description: sync reports db-sync indexing progress.
                properties:
                  dbBlockHeight:
                    description: dbBlockHeight is the latest block height inserted
                      into Postgres.
                    format: int64
                    type: integer
                  dbQueueLength:
                    description: dbQueueLength is the current db-sync database event
