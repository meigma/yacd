                    enum:
                    - dedicatedFollower
                    - primarySidecar
                    type: string
                  primarySidecar:
                    description: |-
                      primarySidecar publishes the attachable material contract when
                      SidecarMaterialReady=True.
                    properties:
                      networkName:
                        description: |-
                          networkName is the referenced CardanoNetwork name this sidecar material
                          is valid for.
                        type: string
                      resources:
                        description: |-
                          resources names the CardanoDBSync-owned resources mounted by the primary
                          Pod sidecar.
                        properties:
                          configMapName:
                            description: configMapName is the db-sync configuration
                              ConfigMap name.
                            type: string
                          metricsServiceName:
                            description: metricsServiceName is the db-sync metrics
